apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostpath-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hostpath-nginx
  template:
    metadata:
      labels:
        app: hostpath-nginx
    spec:
      containers:
        - name: nginx
          image: nginx
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html-volume
          hostPath:
            path: /mnt/hostPath
            type: DirectoryOrCreate