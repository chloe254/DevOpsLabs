---
- name: Provision webapp
  hosts: all
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Node.js and npm
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Install app dependencies
      command: npm install
      args:
        chdir: /home/vagrant/webapp

    - name: Start the application
      shell: nohup node /home/vagrant/webapp/src/server.js > /home/vagrant/webapp/app.log 2>&1 &
      args:
        chdir: /home/vagrant/webapp